name: Generate Champion Live Stats

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *' # 하루 한 번 자정 서버 실시간 자동 동작

permissions:
  contents: write # 덮어쓰기 허가 정책

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Data Collection Script
        run: node collect.js

      - name: Commit and Push Updated Database
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add champions.json
          git commit -m "chore: auto-update league champion database" || exit 0
          git push
